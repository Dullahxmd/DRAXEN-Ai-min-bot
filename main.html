<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAXEN-Ai | Server Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #00ff88;
            --purple: #7c4dff;
            --dark: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Outfit', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        
        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.15), transparent 70%);
            animation: pulse-bg 8s ease-in-out infinite;
        }

        @keyframes pulse-bg {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float-particle 20s linear infinite;
        }

        @keyframes float-particle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 25s; }
        .particle:nth-child(3) { left: 40%; animation-delay: 4s; animation-duration: 22s; }
        .particle:nth-child(4) { left: 60%; animation-delay: 6s; animation-duration: 28s; }
        .particle:nth-child(5) { left: 80%; animation-delay: 8s; animation-duration: 24s; }
        .particle:nth-child(6) { left: 15%; animation-delay: 3s; animation-duration: 26s; }
        .particle:nth-child(7) { left: 35%; animation-delay: 5s; animation-duration: 23s; }
        .particle:nth-child(8) { left: 55%; animation-delay: 7s; animation-duration: 27s; }
        .particle:nth-child(9) { left: 75%; animation-delay: 9s; animation-duration: 21s; }
        .particle:nth-child(10) { left: 90%; animation-delay: 1s; animation-duration: 29s; }

        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin: auto;
            z-index: 10;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.15);
            position: relative;
            overflow: hidden;
            animation: card-entrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes card-entrance {
            0% { opacity: 0; transform: translateY(50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--success), var(--purple));
            border-radius: 40px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(20px);
            animation: border-glow 3s ease-in-out infinite;
        }

        @keyframes border-glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            border: 3px solid var(--border);
            animation: float 4s ease-in-out infinite, rotate-subtle 20s linear infinite;
            box-shadow: 0 20px 60px rgba(0, 210, 255, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes rotate-subtle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            75% { transform: rotate(-2deg); }
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.4), transparent 70%);
            border-radius: 50%;
            animation: glow-pulse 2s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes glow-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradient-shift 4s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: #718096;
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-weight: 400;
        }

        
        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--success);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
            animation: badge-entrance 1s ease 0.3s both;
        }

        @keyframes badge-entrance {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            position: relative;
            animation: pulse-dot 1.5s infinite;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: var(--success);
            border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            transition: 0.3s;
            animation: stat-entrance 0.6s ease both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes stat-entrance {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .stat-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.2);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
        }

        
        .cta-button {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(135deg, var(--purple), #9c27b0);
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 15px 40px rgba(124, 77, 255, 0.4);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            animation: cta-entrance 0.8s ease 0.5s both;
        }

        @keyframes cta-entrance {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .cta-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(124, 77, 255, 0.6);
        }

        .cta-text {
            position: relative;
            z-index: 1;
        }

        
        .footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #4a5568;
            letter-spacing: 1px;
            animation: footer-entrance 1s ease 0.7s both;
        }

        @keyframes footer-entrance {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .footer b {
            color: var(--primary);
            font-weight: 800;
        }

        
        @media (max-width: 768px) {
            body { padding: 30px 15px; }
            .card { 
                padding: 40px 25px; 
                border-radius: 30px;
            }
            h1 { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .logo { width: 100px; height: 100px; }
            .logo-glow { width: 120px; height: 120px; }
            .status-badge { 
                padding: 12px 25px; 
                font-size: 1rem;
            }
            .stats-grid { grid-template-columns: 1fr; }
            .cta-button {
                padding: 18px 40px;
                font-size: 1rem;
            }
        }

      .cta-button { -webkit-tap-highlight-color:transparent; }
      .ripple-btn-wrap { display:inline-block; position:relative; overflow:hidden; border-radius:25px; }
      .btn-ripple {
        position:absolute; border-radius:50%;
        background:rgba(255,255,255,0.3);
        transform:scale(0);
        animation:btnRipple 0.55s linear;
        pointer-events:none;
      }
      @keyframes btnRipple { to{transform:scale(6);opacity:0;} }
      </style>
</head>
<body>
    
    <div class="glow-bg"></div>
    
    
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="card">
            
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
                <img src="https://raw.githubusercontent.com/xhclintohn/Music-Clips-Collection/main/mini.png" class="logo" alt="DRAXEN-Ai">
            </div>

            
            <h1>DRAXEN-Ai</h1>
            <p class="subtitle">WhatsApp Bot by Dullah</p>

            
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>SERVER RUNNING</span>
            </div>

            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-rocket"></i></div>
                    <div class="stat-label">Status</div>
                    <div class="stat-value">Online</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-server"></i></div>
                    <div class="stat-label">Uptime</div>
                    <div class="stat-value" id="uptime-counter">00:00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                    <div class="stat-label">Response</div>
                    <div class="stat-value">Fast</div>
                </div>
            </div>

            
            <a href="" target="_blank" class="cta-button">
                <span class="cta-text">
                    <i class="fas fa-link"></i> FREE SERVER ACTIVE
                </span>
            </a>
        </div>

        
        <div class="footer">
            Powered by Excellence<br>
            © <b>Draxen</b>
        </div>
    </div>

    <script>
      (function() {
        var start = Date.now();
        function pad(n) { return String(n).padStart(2, '0'); }
        function tick() {
          var s = Math.floor((Date.now() - start) / 1000);
          var h = Math.floor(s / 3600);
          var m = Math.floor((s % 3600) / 60);
          var sec = s % 60;
          var el = document.getElementById('uptime-counter');
          if (el) el.textContent = (h > 0 ? pad(h) + ':' : '') + pad(m) + ':' + pad(sec);
        }
        tick();
        setInterval(tick, 1000);

        document.getElementById('cta-wrap').addEventListener('click', function(e) {
          var btn = document.getElementById('cta-btn');
          var rect = btn.getBoundingClientRect();
          var r = document.createElement('span');
          r.className = 'btn-ripple';
          var size = Math.max(rect.width, rect.height);
          r.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (e.clientX - rect.left - size / 2) + 'px;top:' + (e.clientY - rect.top - size / 2) + 'px';
          btn.appendChild(r);
          r.addEventListener('animationend', function() { r.remove(); });
        });
      })();
    </script>
  </body>
</html>
